<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>sharpennd.xyz - Ask</title>
<link rel="icon" href="../assets/paw-64.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e0e0e;
  --text:#f5f5f5;
  --muted:#aaa;
  --border:#2a2a2a;
  --radius:12px;
  --max-w:1050px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.container{
  max-width:var(--max-w);
  margin:0 auto;
  padding:0 18px;
  width:100%;
}
.site-header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
  z-index:50;
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 12px;
}
.nav-links{
  display:flex;
  align-items:center;
  gap:6px;
  margin-left:18px;
}
.nav-link{
  font-size:13px;
  font-weight:500;
  color:var(--muted);
  text-decoration:none;
  padding:4px 6px;
  border-radius:6px;
  transition:color .2s ease, background .2s ease;
}
.nav-link:hover{
  color:var(--text);
  background:rgba(255,255,255,.06);
}
main.container{flex:1}
.card{
  margin-top:18px;
  padding:20px;
  border-radius:var(--radius);
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  font-size:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.6);
}
.form-group{
  margin-bottom:14px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
label{
  font-size:13px;
  color:var(--muted);
}
textarea{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  min-height:160px;
  resize:vertical;
}
textarea:focus{
  outline:none;
  border-color:#ffffff;
  box-shadow:0 0 0 1px rgba(191,191,191,0.4);
}
.submit-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:10px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
  transition:box-shadow .25s ease,transform .25s ease,border-color .25s ease;
}
.submit-btn:hover{
  border-color:#ffffff;
  box-shadow:
    0 0 0 1px rgba(191, 191, 191, 0.4),
    0 0 14px rgba(197, 197, 197, 0.45),
    0 0 28px rgba(182, 182, 182, 0.25);
  transform:translateY(-1px);
}
.site-footer{
  margin-top:20px;
  padding:8px 0;
  text-align:center;
  color:var(--muted);
  border-top:1px solid var(--border);
  font-size:12px;
}
.status{
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}
</style>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;">
      <img src="../assets/paw.png" width="26" height="26">
      <nav class="nav-links">
        <a href="../index.html" class="nav-link">Home</a>
        <a href="../blog/" class="nav-link">Blog</a>
        <a href="../ask/" class="nav-link">Ask</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Ask Me Anything!</h2>
    <p style="color:var(--muted);margin:8px 0 16px;">
      Submit a question or message and it'll be answered on my Twitter!
    </p>

    <form id="askForm">
      <div class="form-group">
        <textarea id="message" name="message" required></textarea>
      </div>
      <input type="text" name="website" style="display:none">

      <div id="turnstileContainer" class="cf-turnstile" data-sitekey="0x4AAAAAAC2qpDeMs_ivc_fm" data-callback="onTurnstileSuccess"></div>

      <button type="submit" class="submit-btn">Send</button>
      <p id="formStatus" class="status"></p>
    </form>
  </section>
</main>

<footer class="site-footer">
  © <span id="currentYear"></span> sharpennd.xyz
</footer>

<script>
document.getElementById("currentYear").textContent = new Date().getFullYear();

let turnstileToken = null;

function onTurnstileSuccess(token){
  turnstileToken = token;
  sendForm();
}

document.getElementById("askForm").addEventListener("submit", (e)=>{
  e.preventDefault();
  const status = document.getElementById("formStatus");

  if(!turnstileToken){
    status.textContent = "Please complete the CAPTCHA.";
    return;
  }

  sendForm();
});

async function sendForm(){
  const form = document.getElementById("askForm");
  const status = document.getElementById("formStatus");

  const data = {
    message: form.message.value,
    website: form.website.value,
    token: turnstileToken
  };

  status.textContent = "Sending...";

  try{
    const res = await fetch("https://your-worker-name.your-account.workers.dev", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok){
      form.reset();
      if(window.turnstile) turnstile.reset();
      turnstileToken = null;
      status.textContent = "Thank you! Your ask has been sent.";
    }else{
      status.textContent = result.error || "Something went wrong.";
    }
  }catch(err){
    console.error(err);
    status.textContent = "Network error. Please try again later.";
  }
}
</script>

</body>
</html>

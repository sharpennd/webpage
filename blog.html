layout: default
title: Blog
permalink: /blog/
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sharpennd - blog</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ page.title }}</h1>
            <p>Welcome to my blog! Here are all my posts:</p>
        </header>

        <main>
            <ul>
                {% for post in site.posts %}
                    <li>
                        <a href="{{ post.url }}">
                            <h2>{{ post.title }}</h2>
                            <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
                        </a>
                    </li>
                {% endfor %}
            </ul>
        </main>
    </div>
</body>
</html>
